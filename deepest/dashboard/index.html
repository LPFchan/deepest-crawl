<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deepest-crawl</title>
  <link rel="stylesheet" href="/app.css">
  <script>
    // Set theme before first paint to avoid a flash: stored choice, else OS preference.
    (function () {
      try {
        var t = localStorage.getItem("deepest:theme");
        if (t !== "dark" && t !== "light") {
          t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <h1>deepest-crawl</h1>
        <div class="status-line">
          <span class="dot idle" id="status-dot"></span>
          <span id="status-text">idle</span>
          <span id="progress-text"></span>
          <span id="conn-status"></span>
        </div>
      </div>
      <form class="url-form" id="crawl-form">
        <input type="url" id="url-input" placeholder="https://example.com">
        <button type="submit" id="crawl-btn">Crawl</button>
      </form>
      <div class="service-strip">
        <span class="service-chip" id="brain-chip">Brain</span>
        <span class="service-chip" id="chrome-chip">Chrome</span>
        <select id="brain-model-select" class="model-select" aria-label="Brain model">
          <option value="">Brain model</option>
        </select>
        <button class="secondary" id="start-services-btn" type="button">Start</button>
        <button class="secondary icon-btn" id="theme-toggle" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">☾</button>
        <div class="service-detail" id="service-detail"></div>
      </div>
    </header>

    <main class="workspace">
      <section class="queue-pane">
        <div class="toolbar">
          <input type="search" id="link-search" placeholder="Filter URLs">
          <select id="status-filter" aria-label="Status">
            <option value="">All</option>
            <option value="pending">pending</option>
            <option value="failed">failed</option>
            <option value="success">success</option>
          </select>
          <select id="host-filter" aria-label="Host">
            <option value="">All hosts</option>
          </select>
        </div>
        <div class="queue-pane-action">
          <button id="crawl-all-btn" class="accent" type="button">Crawl All</button>
          <span id="link-count" class="link-count"></span>
        </div>
        <div class="link-list" id="link-list"></div>

        <div class="queue-dock">
          <div class="queue-panel" id="queue-panel" hidden>
            <div class="queue-panel-head">
              <span>Queue</span>
              <button class="icon-btn secondary" id="queue-panel-close" type="button" aria-label="Hide queue">▾</button>
            </div>
            <div class="queue-panel-list" id="queue-panel-list"></div>
          </div>
          <footer class="now-bar" id="now-bar" hidden>
            <button class="icon-btn now-playpause" id="now-playpause" type="button" aria-label="Pause queue">⏸</button>
            <button class="now-info" id="now-info" type="button" title="Show queue">
              <span class="now-title" id="now-title">—</span>
              <span class="now-progress" id="now-progress"></span>
            </button>
            <button class="icon-btn danger now-clear" id="now-clear" type="button" title="Clear queue and stop" aria-label="Clear queue and stop">✕</button>
          </footer>
        </div>
      </section>

      <div class="pane-resizer" data-resizer="queue-browser" role="separator" aria-orientation="vertical"></div>

      <section class="browser-pane">
        <div class="pane-head">
          <div>
            <h2>Browser</h2>
            <p id="url-display">waiting</p>
          </div>
          <span class="pill" id="mode-display">none</span>
        </div>
        <div class="browser-frame" id="browser-frame">
          <div class="placeholder">No active crawl</div>
        </div>
        <div class="split">
          <section>
            <h3>DOM Text</h3>
            <pre id="dom-text">-</pre>
          </section>
          <section>
            <h3>Error</h3>
            <pre id="error-text">-</pre>
          </section>
        </div>
      </section>

      <div class="pane-resizer" data-resizer="browser-agent" role="separator" aria-orientation="vertical"></div>

      <section class="activity-pane">
        <div class="pane-head compact agent-head">
          <h2>Agent</h2>
          <div class="agent-actions">
            <button class="secondary" id="copy-chat-btn" type="button">Copy</button>
            <button class="secondary" id="clear-chat-btn" type="button">Clear</button>
          </div>
        </div>
        <div class="chat-log" id="chat-log">
          <div class="msg memory" id="knowledge-card">
            <div class="msg-label">Domain Memory</div>
            <div class="knowledge-list" id="knowledge-list"></div>
            <div class="playbook-list" id="playbook-list"></div>
          </div>
          <div class="timeline-list" id="timeline-list"></div>
        </div>

        <details class="memory-editor">
          <summary>Domain memory</summary>
          <form class="note-form" id="domain-note-form">
            <textarea id="domain-note-input" placeholder="Domain note"></textarea>
            <button type="submit">Save</button>
          </form>
          <form class="playbook-form" id="domain-playbook-form">
            <input type="text" id="domain-playbook-title" placeholder="Playbook title">
            <textarea id="domain-playbook-steps" placeholder="One step per line"></textarea>
            <button type="submit">Save</button>
          </form>
        </details>

        <form class="prompt-form" id="prompt-form">
          <input type="text" id="prompt-input" placeholder="Tell the agent what to do">
          <button type="submit" id="prompt-btn">Send</button>
        </form>
      </section>
    </main>
  </div>

  <div class="ctx-menu" id="ctx-menu" hidden></div>

  <script src="/app.js"></script>
</body>
</html>
