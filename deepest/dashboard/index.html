<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deepest-crawl</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">DC</div>
        <div>
          <h1>deepest-crawl</h1>
          <div class="status-line">
            <span class="dot idle" id="status-dot"></span>
            <span id="status-text">idle</span>
            <span id="progress-text">0 / 0</span>
            <span id="conn-status">disconnected</span>
          </div>
        </div>
      </div>
      <form class="url-form" id="crawl-form">
        <input type="url" id="url-input" placeholder="https://example.com">
        <button type="submit" id="crawl-btn">Crawl</button>
      </form>
      <div class="service-strip">
        <select id="brain-model-select" aria-label="Brain model">
          <option value="">Brain model</option>
        </select>
        <span class="service-chip" id="brain-chip">Brain: checking</span>
        <span class="service-chip" id="chrome-chip">Chrome: checking</span>
        <button class="secondary" id="start-services-btn" type="button">Start Services</button>
        <div class="service-detail" id="service-detail"></div>
      </div>
    </header>

    <main class="workspace">
      <section class="queue-pane">
        <div class="pane-head">
          <div>
            <h2>Uncrawlable URLs</h2>
            <p id="queue-summary">loading</p>
          </div>
          <button class="secondary" id="refresh-links-btn" type="button">Refresh DB</button>
        </div>
        <div class="toolbar">
          <input type="search" id="link-search" placeholder="Filter URLs">
          <select id="reason-filter" aria-label="Reason">
            <option value="">All reasons</option>
            <option value="unretrievable">unretrievable</option>
            <option value="needs_deep_crawl">needs_deep_crawl</option>
          </select>
          <select id="status-filter" aria-label="Status">
            <option value="">All statuses</option>
            <option value="pending">pending</option>
            <option value="failed">failed</option>
            <option value="success">success</option>
          </select>
        </div>
        <div class="queue-actions idle" id="queue-actions">
          <button id="crawl-all-btn" class="accent" type="button">Crawl All</button>
          <button id="stop-job-btn" class="danger secondary" type="button" hidden>Stop</button>
        </div>
        <div class="link-list" id="link-list"></div>
      </section>

      <div class="pane-resizer" data-resizer="queue-browser" role="separator" aria-orientation="vertical"></div>

      <section class="browser-pane">
        <div class="pane-head">
          <div>
            <h2>Browser</h2>
            <p id="url-display">waiting</p>
          </div>
          <span class="pill" id="mode-display">none</span>
        </div>
        <div class="browser-frame" id="browser-frame">
          <div class="placeholder">No active crawl</div>
        </div>
        <div class="split">
          <section>
            <h3>DOM Text</h3>
            <pre id="dom-text">-</pre>
          </section>
          <section>
            <h3>Error</h3>
            <pre id="error-text">-</pre>
          </section>
        </div>
      </section>

      <div class="pane-resizer" data-resizer="browser-agent" role="separator" aria-orientation="vertical"></div>

      <section class="activity-pane">
        <div class="pane-head compact agent-head">
          <h2>Agent</h2>
          <button class="secondary" id="clear-chat-btn" type="button">Clear</button>
        </div>
        <div class="chat-log" id="chat-log">
          <div class="msg memory" id="knowledge-card">
            <div class="msg-label">Domain Memory</div>
            <div class="knowledge-list" id="knowledge-list"></div>
            <div class="playbook-list" id="playbook-list"></div>
          </div>
          <div class="timeline-list" id="timeline-list"></div>
        </div>

        <details class="memory-editor">
          <summary>Domain memory</summary>
          <form class="note-form" id="domain-note-form">
            <textarea id="domain-note-input" placeholder="Domain note"></textarea>
            <button type="submit">Save</button>
          </form>
          <form class="playbook-form" id="domain-playbook-form">
            <input type="text" id="domain-playbook-title" placeholder="Playbook title">
            <textarea id="domain-playbook-steps" placeholder="One step per line"></textarea>
            <button type="submit">Save</button>
          </form>
        </details>

        <form class="prompt-form" id="prompt-form">
          <input type="text" id="prompt-input" placeholder="Tell the agent what to do">
          <button type="submit" id="prompt-btn">Send</button>
        </form>
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
